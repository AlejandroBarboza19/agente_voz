version: "3.9"

services:

  # ── Ollama (LLM local, gratuito) ──────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: voice-agent-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=24h
    # Si tienes GPU NVIDIA, descomenta:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s

  # ── Pull del modelo al iniciar ────────────────────────────────────────────
  ollama-model-init:
    image: ollama/ollama:latest
    container_name: voice-agent-model-init
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: >
      sh -c "ollama pull ${OLLAMA_MODEL:-llama3.2} && echo 'Model ready'"
    restart: "no"

  # ── API FastAPI ────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: voice-agent-api
    restart: unless-stopped
    ports:
      - "8001:8000"
    env_file:
      - .env
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      # Hot-reload en desarrollo (comentar en producción)
      - ./app:/app/app
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  ollama_data:
    name: voice-agent-ollama-data
