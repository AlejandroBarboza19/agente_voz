services:

  # ── Ollama (LLM local, gratuito) ──────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: voice-agent-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=24h
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s

  # ── Pull del modelo al iniciar ────────────────────────────────────────────
  ollama-model-init:
    image: ollama/ollama:latest
    container_name: voice-agent-model-init
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: >
      sh -c "ollama pull ${OLLAMA_MODEL:-llama3.2:1b} && echo 'Model ready'"
    restart: "no"

  # ── API FastAPI ────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: voice-agent-api
    restart: unless-stopped
    ports:
      - "8001:8000"
    env_file:
      - .env
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - HF_HOME=/app/.cache/huggingface
      - POSTGRES_DSN=postgresql://postgres:postgres@db:5432/agente_voz
    depends_on:
      ollama:
        condition: service_healthy
      db:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - whisper_models:/app/.cache/huggingface

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: voice-agent-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: agente_voz
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  ollama_data:
    name: voice-agent-ollama-data
  whisper_models:
    name: voice-agent-whisper-models
  postgres_data:
    name: voice-agent-postgres-data
