version: '3.8'

services:

  # ── API FastAPI ────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: voice-agent-api
    restart: unless-stopped
    ports:
      - "8001:8000"
    env_file:
      - .env
    environment:
      - POSTGRES_DSN=postgresql://postgres:postgres@db:5432/agente_voz
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./app:/app/app

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: voice-agent-db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: agente_voz
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d agente_voz"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    name: voice-agent-postgres-data
