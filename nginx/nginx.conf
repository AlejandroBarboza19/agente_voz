events {
    worker_connections 1024;
}

http {
    # Redirigir HTTP → HTTPS
    server {
        listen 80;
        server_name agentevoz.duckdns.org;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS
    server {
        listen 443 ssl;
        server_name agentevoz.duckdns.org;

        ssl_certificate     /etc/letsencrypt/live/agentevoz.duckdns.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/agentevoz.duckdns.org/privkey.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # Subida de audio (hasta 25MB)
        client_max_body_size 25M;

        location / {
            proxy_pass         http://api:8000;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }
    }
}
